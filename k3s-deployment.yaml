apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-4720-track-3
  namespace: mking205
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cs-4720-track-3
  template:
    metadata:
      labels:
        app: cs-4720-track-3
    spec:
      containers:
        - name: cs-4720-track-3
          image: ghcr.io/milestking/cs-4720-track-3:v2
          env:
            - name: DATABASE_URL
              value: "postgresql://neondb_owner:npg_H24FkKVWBZdj@ep-rapid-paper-at220tq3-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
            - name: DIRECT_URL
              value: "postgresql://neondb_owner:npg_H24FkKVWBZdj@ep-rapid-paper-at220tq3.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cs-4720-track-3
  namespace: mking205
spec:
  selector:
    app: cs-4720-track-3
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cs-4720-track-3
  namespace: mking205
spec:
  ingressClassName: traefik
  rules:
    - host: mking205.k3s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cs-4720-track-3
                port:
                  number: 80